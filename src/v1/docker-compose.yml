version: '3.7'

services:

  ai_web_server:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - docker_conf/var.env
    entrypoint: ./script_web_recs_server.sh
    depends_on:
      - redis
      - redis-slave
      - redis-sentinel

  nginx:
    image: ai_nginx
    build:
      context: .
      dockerfile: Dockerfile-nginx
    ports:
      - 8000:80
    depends_on:
      - ai_web_server

  redis:
    image: bitnami/redis:6.2
    environment:
      - REDIS_REPLICATION_MODE=master
      - REDIS_PASSWORD=redis_password
    ports:
      - 6379
  redis-slave:
    image: bitnami/redis:6.2
    environment:
      - REDIS_REPLICATION_MODE=slave
      - REDIS_MASTER_HOST=redis
      - REDIS_MASTER_PASSWORD=redis_password
      - REDIS_PASSWORD=redis_password
    ports:
      - 6379
    depends_on:
      - redis
    deploy:
      replicas: 2
  redis-sentinel:
    image: bitnami/redis-sentinel:6.2
    environment:
      - REDIS_MASTER_PASSWORD=redis_password
    ports:
      - 26379-26381:26379
    depends_on:
      - redis
      - redis-slave
    deploy:
      replicas: 3
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: poetry run celery -A web_recommendation.celery.app worker --loglevel=info
    env_file:
      - docker_conf/var.env
    depends_on:
      - redis
