repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.1
    hooks:
      - id: ruff

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        language: system

  - repo: local
    hooks:
      - id: poetry check
        name: poetry check
        entry: poetry check --lock
        language: system
        pass_filenames: false # no args needed
      - id: pytest
        name: pytest
        entry: pytest tests
        language: system
        types: [python]
        pass_filenames: false # pytest discovers tests on its own
