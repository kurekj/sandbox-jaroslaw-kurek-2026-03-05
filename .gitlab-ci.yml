# Run pipelines for your merge requests, tags, and protected branches
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG

# Global variables
variables:
  PYTHON_VERSION: "3.10"
  POETRY_VERSION: "2.1.2"

# Use Python as the base image
image: python:$PYTHON_VERSION

stages:
  - validate
  - build

validate:
  stage: validate
  before_script:
    - pip install "poetry==${POETRY_VERSION}"
    - poetry install
  script:
    - poetry check --lock
    - poetry run ruff check src tests
    - poetry run mypy src tests
    - poetry run pytest tests

build_api:
  image: docker:latest
  services:
    - docker:dind
  stage: build
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - ./scripts/build.sh containers/ae_api.Dockerfile ae_api
